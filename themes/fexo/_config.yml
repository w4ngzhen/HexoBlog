# Blog info
blog_name: CompileMind
slogan: Compile Mind
url: http://compilemind.com

# Set avatar (Absolute url and relative url)
avatar: /images/avatar.jpg

# Set favicon
favicon: /favicon.ico

# For seo
keywords: w4ngzhen

home_nav:
  - name: Blog
    url: /archives
    target_blank: false #不在新页面打开
  - name: Project
    url: https://github.com/w4ngzhen?tab=repositories
    target_blank: true #在新页面打开
  - name: Github
    url: https://github.com/w4ngzhen
    target_blank: true

# config page nav
page_nav:
  - name: 博客
    url: /archives/
    target_blank: false # 不在新页面打开
  - name: 标签
    url: /tag/
    target_blank: false
  - name: 关于
    url: /about/
    target_blank: false
  - name: 搜索
    url: /search/
    target_blank: false # 在新页面打开

page_nav_style: CIRCLE  # CIRCLE|ROUND_RECT

# 面包屑
breadcrumb:
  isShow: false # true|fase

# 盒子
toolbox:
  isShow: false # true|fase
  text: 盒子

search_slogan:
  isShow: true # true|fase
  text: Can you find the bug of world ~

# set backtop show or hide
backtop:
  home: false
  archive: false
  category: true
  tag: true
  post: true
  link: false
  about: false

post:
  header_align: CENTER # LEFT|CENTER
  showToc: true # true|false
  open_in_new_window: true

# =========================================================
# 个性化设置
# =========================================================

# 这个值取决于你得背景图片是深色还是浅色，深色用dark，浅色用light
home_background_scheme: light # dark、light

# custom font-family 暂时只支持这3种英文字体，你可以完全自定义字体(看文档)
# blog_name_font_familiy: calligraffittiregular
# blog_name_font_familiy: Lobster-Regular
blog_name_font_familiy: PoiretOne-Regular

init_page_content: HOME_NAV  # HOME_NAV | POST


# =========================================================
# 第三方服务
# =========================================================

# 不算子,文章访问量统计和显示
busuanzi: true

# =========================================================
# 页面内容设置
# =========================================================
about:
  - type: me
    icon: icon-user
    text_value:
    - "Zhen，1996，Spring."
    - "喜欢Java、Scala、C#、JS，喜欢Linux，喜欢VIM，喜欢编译原理"
    - "全干开发工程师"
    - "常用Java、C#"
  - type: Github
    icon: icon-github
    text_key: Github
    text_value: "@w4ngzhen"
    text_value_url: https://github.com/w4ngzhen
  - type: mail
    icon: icon-mail
    text_key: Gmail
    text_value: "w4ngzhen@hotmail.com"
  - type: location
    icon: icon-location
    text_value: 成都
